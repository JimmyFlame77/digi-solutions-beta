<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digi Solutions | Client Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base:       #0a0c10;
      --bg-card:       #111820;
      --bg-card-hover: #141e2a;
      --neon:          #00c8ff;
      --neon-dim:      rgba(0,200,255,0.15);
      --neon-glow:     0 0 8px rgba(0,200,255,0.7), 0 0 20px rgba(0,200,255,0.35);
      --neon-glow-lg:  0 0 14px rgba(0,200,255,0.9), 0 0 40px rgba(0,200,255,0.4);
      --text-primary:  #e8f4f8;
      --text-secondary:#7a9bb0;
      --text-muted:    #3d5a6e;
      --border:        rgba(0,200,255,0.18);
      --border-active: rgba(0,200,255,0.65);
      --radius:        10px;
      --radius-lg:     16px;
      --font:          'Segoe UI', system-ui, sans-serif;
      --transition:    0.22s ease;
    }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 100; opacity: 0.4;
    }
    .bg-glow {
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,200,255,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-name {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neon);
      text-shadow: var(--neon-glow);
    }
    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-active);
      border-radius: var(--radius-lg);
      padding: 2rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0,200,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      box-shadow: 0 0 10px var(--neon);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .card-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      letter-spacing: 0.04em;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }
    .form-input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
      transition: var(--transition);
    }
    .form-input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
    }
    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute;
      right: 0.75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer; font-size: 1rem;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--neon); }
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      font-size: 0.75rem;
    }
    .remember-row label {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text-secondary); cursor: pointer;
    }
    .remember-row a {
      color: var(--neon);
      text-decoration: none;
      font-size: 0.72rem;
    }
    .remember-row a:hover { text-shadow: var(--neon-glow); }
    .btn {
      width: 100%;
      padding: 0.7rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      font-family: var(--font);
      transition: var(--transition);
      border: none;
      margin-bottom: 0.75rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #005f8a, #0099cc);
      color: #fff;
      border: 1px solid var(--border-active);
      box-shadow: var(--neon-glow);
    }
    .btn-primary:hover { box-shadow: var(--neon-glow-lg); transform: translateY(-1px); }
    .btn-google {
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .btn-google:hover { border-color: var(--border-active); background: var(--bg-card-hover); }
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1rem 0; color: var(--text-muted); font-size: 0.72rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }
    .register-link {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }
    .register-link a { color: var(--neon); text-decoration: none; font-weight: 600; }
    .register-link a:hover { text-shadow: var(--neon-glow); }
    .error-msg {
      background: rgba(255,60,60,0.1);
      border: 1px solid rgba(255,60,60,0.3);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      font-size: 0.75rem;
      color: #ff6b6b;
      margin-bottom: 1rem;
      display: none;
    }
    .google-icon { width: 18px; height: 18px; }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page-wrap">
  <div class="brand">
    <p class="brand-name">Digi Solutions</p>
    <p class="brand-sub">Client Portal</p>
  </div>

  <div class="card">
    <p class="card-title">Welcome Back</p>
    <p class="card-sub">Sign in to access your dashboard</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input id="email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrap">
        <input id="password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" type="button" onclick="togglePassword('password', this)">👁</button>
      </div>
    </div>
    <div class="remember-row">
      <label><input type="checkbox" id="remember" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In →</button>

    <div class="divider">or</div>

    <button class="btn btn-google" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="register-link">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword,
           GoogleAuthProvider, signInWithPopup,
           onAuthStateChanged, setPersistence,
           browserLocalPersistence,
           browserSessionPersistence }    from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyByncAGvxYsQOUpfaP5cTNSRtF0WGhkdm8",
    authDomain:        "digi-dashboard-login.firebaseapp.com",
    projectId:         "digi-dashboard-login",
    storageBucket:     "digi-dashboard-login.firebasestorage.app",
    messagingSenderId: "698910539777",
    appId:             "1:698910539777:web:8be83da71e2a0863fd8000"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // If already logged in, skip to dashboard
  onAuthStateChanged(auth, user => {
    if (user) window.location.replace('index.html');
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  window.togglePassword = (id, btn) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  };

  window.handleLogin = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;

    try {
      const persistence = remember ? browserLocalPersistence : browserSessionPersistence;
      await setPersistence(auth, persistence);
      await signInWithEmailAndPassword(auth, email, password);
      window.location.replace('index.html');
    } catch(e) {
      const msgs = {
        'auth/user-not-found':  'No account found with that email.',
        'auth/wrong-password':  'Incorrect password. Please try again.',
        'auth/invalid-email':   'Please enter a valid email address.',
        'auth/too-many-requests':'Too many attempts. Please try again later.',
        'auth/invalid-credential': 'Invalid email or password.'
      };
      showError(msgs[e.code] || 'Sign in failed. Please try again.');
      btn.textContent = 'Sign In →'; btn.disabled = false;
    }
  };

  window.handleGoogleLogin = async () => {
    try {
      await signInWithPopup(auth, provider);
      window.location.replace('index.html');
    } catch(e) {
      showError('Google sign-in failed. Please try again.');
    }
  };

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleLogin();
  });
</script>
</body>
</html>
