<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digi Solutions | Create Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base:       #0a0c10;
      --bg-card:       #111820;
      --bg-card-hover: #141e2a;
      --neon:          #00c8ff;
      --neon-dim:      rgba(0,200,255,0.15);
      --neon-glow:     0 0 8px rgba(0,200,255,0.7), 0 0 20px rgba(0,200,255,0.35);
      --neon-glow-lg:  0 0 14px rgba(0,200,255,0.9), 0 0 40px rgba(0,200,255,0.4);
      --text-primary:  #e8f4f8;
      --text-secondary:#7a9bb0;
      --text-muted:    #3d5a6e;
      --border:        rgba(0,200,255,0.18);
      --border-active: rgba(0,200,255,0.65);
      --radius:        10px;
      --radius-lg:     16px;
      --font:          'Segoe UI', system-ui, sans-serif;
      --transition:    0.22s ease;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg-base); color: var(--text-primary); }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 100; opacity: 0.4;
    }
    .bg-glow {
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,200,255,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .page-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1rem;
    }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-name { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--neon); text-shadow: var(--neon-glow); }
    .brand-sub  { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.3rem; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border-active);
      border-radius: var(--radius-lg); padding: 2rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 0 40px rgba(0,200,255,0.08);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent);
      box-shadow: 0 0 10px var(--neon);
    }
    .card-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem; }
    .card-sub   { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 0.35rem; }
    .form-input {
      width: 100%; background: var(--bg-base); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.65rem 0.9rem;
      color: var(--text-primary); font-size: 0.85rem; font-family: var(--font);
      outline: none; transition: var(--transition);
    }
    .form-input:focus { border-color: var(--border-active); box-shadow: 0 0 0 3px rgba(0,200,255,0.1); }
    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--neon); }
    .pw-strength { height: 4px; border-radius: 4px; margin-top: 0.4rem; background: var(--border); overflow: hidden; }
    .pw-strength-bar { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
    .pw-hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem; }
    .btn {
      width: 100%; padding: 0.7rem; border-radius: var(--radius);
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em;
      cursor: pointer; font-family: var(--font); transition: var(--transition);
      border: none; margin-bottom: 0.75rem;
    }
    .btn-primary { background: linear-gradient(135deg, #005f8a, #0099cc); color: #fff; border: 1px solid var(--border-active); box-shadow: var(--neon-glow); }
    .btn-primary:hover { box-shadow: var(--neon-glow-lg); transform: translateY(-1px); }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; color: var(--text-muted); font-size: 0.72rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { background: var(--bg-base); color: var(--text-primary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .btn-google:hover { border-color: var(--border-active); background: var(--bg-card-hover); }
    .login-link { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 1.25rem; }
    .login-link a { color: var(--neon); text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-shadow: var(--neon-glow); }
    .error-msg { background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3); border-radius: var(--radius); padding: 0.6rem 0.85rem; font-size: 0.75rem; color: #ff6b6b; margin-bottom: 1rem; display: none; }
    .success-msg { background: rgba(0,255,157,0.08); border: 1px solid rgba(0,255,157,0.25); border-radius: var(--radius); padding: 0.6rem 0.85rem; font-size: 0.75rem; color: #00ff9d; margin-bottom: 1rem; display: none; }
    .google-icon { width: 18px; height: 18px; }
    @media (max-width: 400px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page-wrap">
  <div class="brand">
    <p class="brand-name">Digi Solutions</p>
    <p class="brand-sub">Client Portal</p>
  </div>

  <div class="card">
    <p class="card-title">Create Your Account</p>
    <p class="card-sub">Set up your client portal access</p>

    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label" for="first-name">First Name</label>
        <input id="first-name" class="form-input" type="text" placeholder="John" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="last-name">Last Name</label>
        <input id="last-name" class="form-input" type="text" placeholder="Smith" autocomplete="family-name" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="business-name">Business Name</label>
      <input id="business-name" class="form-input" type="text" placeholder="Acme Co." autocomplete="organization" />
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input id="email" class="form-input" type="email" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrap">
        <input id="password" class="form-input" type="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)" />
        <button class="toggle-pw" type="button" onclick="togglePassword('password', this)">👁</button>
      </div>
      <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
      <p class="pw-hint" id="pw-hint">Use 8+ characters with numbers &amp; symbols</p>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <div class="password-wrap">
        <input id="confirm-password" class="form-input" type="password" placeholder="Repeat password" autocomplete="new-password" />
        <button class="toggle-pw" type="button" onclick="togglePassword('confirm-password', this)">👁</button>
      </div>
    </div>

    <button class="btn btn-primary" id="register-btn" onclick="handleRegister()">Create Account →</button>

    <div class="divider">or</div>

    <button class="btn btn-google" onclick="handleGoogleRegister()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google
    </button>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                    from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword,
           updateProfile, GoogleAuthProvider,
           signInWithPopup }                  from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
  import { getFirestore, doc, setDoc }        from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyByncAGvxYsQOUpfaP5cTNSRtF0WGhkdm8",
    authDomain:        "digi-dashboard-login.firebaseapp.com",
    projectId:         "digi-dashboard-login",
    storageBucket:     "digi-dashboard-login.firebasestorage.app",
    messagingSenderId: "698910539777",
    appId:             "1:698910539777:web:8be83da71e2a0863fd8000"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  function showError(msg)   { const e = document.getElementById('error-msg');   e.textContent = msg; e.style.display = 'block'; document.getElementById('success-msg').style.display = 'none'; }
  function showSuccess(msg) { const e = document.getElementById('success-msg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('error-msg').style.display   = 'none'; }

  async function saveProfile(user, firstName, lastName, businessName) {
    await setDoc(doc(db, 'profiles', user.uid), {
      firstName, lastName, businessName,
      email: user.email,
      createdAt: new Date().toISOString()
    });
  }

  window.togglePassword = (id, btn) => {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  };

  window.checkStrength = (val) => {
    const bar  = document.getElementById('pw-bar');
    const hint = document.getElementById('pw-hint');
    let score = 0;
    if (val.length >= 8)          score++;
    if (/[A-Z]/.test(val))        score++;
    if (/[0-9]/.test(val))        score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w: '0%',   bg: 'transparent',     txt: 'Use 8+ characters with numbers & symbols' },
      { w: '25%',  bg: '#ff5050',         txt: 'Weak — add uppercase letters' },
      { w: '50%',  bg: '#ffc800',         txt: 'Fair — add numbers or symbols' },
      { w: '75%',  bg: '#00c8ff',         txt: 'Good — almost there!' },
      { w: '100%', bg: '#00ff9d',         txt: 'Strong password ✓' }
    ];
    bar.style.width      = levels[score].w;
    bar.style.background = levels[score].bg;
    hint.textContent     = levels[score].txt;
  };

  window.handleRegister = async () => {
    const firstName    = document.getElementById('first-name').value.trim();
    const lastName     = document.getElementById('last-name').value.trim();
    const businessName = document.getElementById('business-name').value.trim();
    const email        = document.getElementById('email').value.trim();
    const password     = document.getElementById('password').value;
    const confirm      = document.getElementById('confirm-password').value;

    if (!firstName || !lastName || !businessName || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }
    if (password.length < 8)  { showError('Password must be at least 8 characters.'); return; }

    const btn = document.getElementById('register-btn');
    btn.textContent = 'Creating account…'; btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: firstName + ' ' + lastName });
      await saveProfile(cred.user, firstName, lastName, businessName);
      showSuccess('Account created! Redirecting to your dashboard…');
      setTimeout(() => window.location.replace('index.html'), 1500);
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/weak-password':        'Password is too weak. Use at least 8 characters.'
      };
      showError(msgs[e.code] || 'Registration failed. Please try again.');
      btn.textContent = 'Create Account →'; btn.disabled = false;
    }
  };

  window.handleGoogleRegister = async () => {
    try {
      const cred = await signInWithPopup(auth, provider);
      const user = cred.user;
      const nameParts = (user.displayName || '').split(' ');
      await saveProfile(user, nameParts[0] || '', nameParts.slice(1).join(' ') || '', '');
      window.location.replace('index.html');
    } catch(e) {
      showError('Google sign-up failed. Please try again.');
    }
  };
</script>
</body>
</html>
